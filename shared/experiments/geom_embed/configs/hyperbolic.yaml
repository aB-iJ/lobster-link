# Hyperbolic embeddings experiment

experiment:
  name: "hyperbolic_poincare"
  description: "Hyperbolic embeddings (Poincaré ball) on semantic relations"
  seed: 42

data:
  path: "data/"
  datasets: ["wordnet", "bats", "simlex"]
  vocab_size: 1000  # will be updated automatically

model:
  geometry: "hyperbolic"
  embedding_dim: 300
  init_scale: 0.01
  manifold_args:
    curvature: -1.0

training:
  optimizer: "adam"
  learning_rate: 0.001
  batch_size: 512
  num_epochs: 50
  negative_samples: 10
  negative_sampler: "uniform"
  loss: "geometric"
  margin: 1.0

evaluation:
  tasks: ["hierarchical", "analogy", "similarity"]
  metrics: ["mean_rank", "map", "spearman"]
  eval_frequency: 5  # epochs

logging:
  log_dir: "results/hyperbolic_poincare"
  save_checkpoints: true
  checkpoint_frequency: 10  # epochs